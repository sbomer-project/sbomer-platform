{{- if .Values.global.includeDependencyTrack }}
apiVersion: v1
kind: Secret
metadata:
  # Using the standard release name prefix to match your sbomer-release pattern
  name: {{ .Release.Name }}-dtrack-secret
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  # This is the dummy key that gets injected into the dtrack-publisher
  api-key: "dev-dummy-api-key-123456789"
{{- end }}